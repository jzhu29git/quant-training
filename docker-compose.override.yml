services:
  panel-api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./apps/api:/app

  panel-web:
    build:
      target: dev
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./apps/web:/app
      - panel-web-node-modules:/app/node_modules
      - panel-web-next:/app/.next

volumes:
  panel-web-node-modules:
  panel-web-next:
